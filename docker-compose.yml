services:
  # ProtonVPN + Tailscale Exit Node Container
  # This is the core service that connects to ProtonVPN and advertises as Tailscale exit node
  # Frontend and rust-backend share this container's network namespace via network_mode
  proton-tailscale-exit:
    build:
      context: ./docker
      dockerfile: Dockerfile
    restart: unless-stopped

    # Required capabilities for VPN and networking
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - NET_RAW

    # Required for Tailscale kernel TUN mode
    devices:
      - /dev/net/tun:/dev/net/tun

    # Required for WireGuard kernel module and IP forwarding
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

    environment:
      # ProtonVPN WireGuard Configuration
      # Get these from your ProtonVPN account WireGuard settings
      - PROTON_WG_PRIVATE_KEY=${PROTON_WG_PRIVATE_KEY:?PROTON_WG_PRIVATE_KEY is required}
      - PROTON_WG_PUBLIC_KEY=${PROTON_WG_PUBLIC_KEY:?PROTON_WG_PUBLIC_KEY is required}
      - PROTON_WG_ENDPOINT=${PROTON_WG_ENDPOINT:-nl-free-01.protonvpn.net:51820}
      - PROTON_WG_DNS=${PROTON_WG_DNS:-10.8.0.1}
      - PROTON_WG_ADDRESS=${PROTON_WG_ADDRESS:-10.8.0.2/32}
      - PROTON_WG_ALLOWED_IPS=${PROTON_WG_ALLOWED_IPS:-0.0.0.0/0,::/0}

      # Tailscale Configuration
      # Generate auth key at: https://login.tailscale.com/admin/settings/keys
      - TAILSCALE_AUTH_KEY=${TAILSCALE_AUTH_KEY:?TAILSCALE_AUTH_KEY is required}
      - TAILSCALE_HOSTNAME=${TAILSCALE_HOSTNAME:-proton-exit-node}
      - TAILSCALE_ADVERTISE_ROUTES=${TAILSCALE_ADVERTISE_ROUTES:-}
      - TAILSCALE_ACCEPT_DNS=${TAILSCALE_ACCEPT_DNS:-false}
      - TAILSCALE_SSH=${TAILSCALE_SSH:-true}
      - TAILSCALE_USERSPACE_NETWORKING=${TAILSCALE_USERSPACE_NETWORKING:-false}
      - TAILSCALE_PORT=${TAILSCALE_PORT:-41641}

      # Security settings
      - KILL_SWITCH=${KILL_SWITCH:-true}
      - HEALTH_CHECK_URL=${HEALTH_CHECK_URL:-https://ipinfo.io}

      # STUN/Data port bypass (route via eth0 instead of VPN for direct connections)
      - BYPASS_STUN_VIA_ETH0=${BYPASS_STUN_VIA_ETH0:-true}
      - BYPASS_TAILSCALE_PORT_VIA_ETH0=${BYPASS_TAILSCALE_PORT_VIA_ETH0:-true}

      # Tailscale Serve (expose frontend via HTTPS 443)
      - TAILSCALE_SERVE_FRONTEND=${TAILSCALE_SERVE_FRONTEND:-true}

    volumes:
      - tailscale-state:/var/lib/tailscale

    dns:
      - ${MACVLAN_GATEWAY:?MACVLAN_GATEWAY is required}
      - 1.1.1.1

    networks:
      vpn_macvlan:
        ipv4_address: ${CONTAINER_IP:?CONTAINER_IP is required}

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "bun", "run", "/app/entrypoint.ts", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


  # Rust Backend API
  # Provides REST API for managing the VPN connection and exit node
  # Shares network namespace with proton-tailscale-exit (accessible at localhost:8080)
  rust-backend:
    build:
      context: ./rust-backend
      dockerfile: Dockerfile
    restart: unless-stopped

    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8080}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - CONFIG_PATH=/app/config

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - rust-config:/app/config

    # Share network namespace with proton-tailscale-exit
    # This makes rust-backend accessible at localhost:8080 from the exit node container
    network_mode: "service:proton-tailscale-exit"

    depends_on:
      proton-tailscale-exit:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Frontend - Static files served by nginx
  # Provides the web dashboard for managing the exit node
  # Shares network namespace with proton-tailscale-exit (accessible at localhost:80)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

    environment:
      - API_URL=http://localhost:8080

    # Share network namespace with proton-tailscale-exit
    # tailscale serve proxies HTTPS 443 -> localhost:80
    network_mode: "service:proton-tailscale-exit"

    depends_on:
      rust-backend:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vpn_macvlan:
    name: ${MACVLAN_NETWORK_NAME:-vpn_macvlan}
    external: true

volumes:
  tailscale-state:
    driver: local
  rust-config:
    driver: local

