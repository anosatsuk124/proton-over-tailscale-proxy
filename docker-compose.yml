services:
  # ProtonVPN + Tailscale Exit Node Container
  # This is the core service that connects to ProtonVPN and advertises as Tailscale exit node
  proton-tailscale-exit:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: proton-tailscale-exit-node
    restart: unless-stopped
    
    # Required capabilities for VPN and networking
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
      - NET_RAW
    
    # Required for WireGuard kernel module and IP forwarding
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    
    environment:
      # ProtonVPN WireGuard Configuration
      # Get these from your ProtonVPN account WireGuard settings
      - PROTON_WG_PRIVATE_KEY=${PROTON_WG_PRIVATE_KEY:?PROTON_WG_PRIVATE_KEY is required}
      - PROTON_WG_PUBLIC_KEY=${PROTON_WG_PUBLIC_KEY:?PROTON_WG_PUBLIC_KEY is required}
      - PROTON_WG_ENDPOINT=${PROTON_WG_ENDPOINT:-nl-free-01.protonvpn.net:51820}
      - PROTON_WG_DNS=${PROTON_WG_DNS:-10.8.0.1}
      - PROTON_WG_ADDRESS=${PROTON_WG_ADDRESS:-10.8.0.2/32}
      - PROTON_WG_ALLOWED_IPS=${PROTON_WG_ALLOWED_IPS:-0.0.0.0/0,::/0}
      
      # Tailscale Configuration
      # Generate auth key at: https://login.tailscale.com/admin/settings/keys
      - TAILSCALE_AUTH_KEY=${TAILSCALE_AUTH_KEY:?TAILSCALE_AUTH_KEY is required}
      - TAILSCALE_HOSTNAME=${TAILSCALE_HOSTNAME:-proton-exit-node}
      - TAILSCALE_ADVERTISE_ROUTES=${TAILSCALE_ADVERTISE_ROUTES:-}
      - TAILSCALE_ACCEPT_DNS=${TAILSCALE_ACCEPT_DNS:-false}
      - TAILSCALE_SSH=${TAILSCALE_SSH:-true}
      - TAILSCALE_USERSPACE_NETWORKING=${TAILSCALE_USERSPACE_NETWORKING:-true}
      
      # Security settings
      - KILL_SWITCH=${KILL_SWITCH:-true}
      - HEALTH_CHECK_URL=${HEALTH_CHECK_URL:-https://ipinfo.io}
    
    volumes:
      - tailscale-state:/var/lib/tailscale
    
    ports:
      - "41641:41641/udp"
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    healthcheck:
      test: ["CMD", "/app/entrypoint.sh", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    networks:
      - proton-tailscale-net

  # Rust Backend API
  # Provides REST API for managing the VPN connection and exit node
  rust-backend:
    build:
      context: ./rust-backend
      dockerfile: Dockerfile
    container_name: proton-tailscale-api
    restart: unless-stopped
    
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8080}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - CONFIG_PATH=/app/config
    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - rust-config:/app/config
    
    ports:
      - "${API_PORT:-8080}:8080"
    
    depends_on:
      proton-tailscale-exit:
        condition: service_healthy
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    networks:
      - proton-tailscale-net

  # Frontend - Static files served by nginx
  # Provides the web dashboard for managing the exit node
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proton-tailscale-frontend
    restart: unless-stopped
    
    environment:
      - API_URL=http://rust-backend:8080
    
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    
    depends_on:
      rust-backend:
        condition: service_healthy
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - proton-tailscale-net

volumes:
  tailscale-state:
    driver: local
  rust-config:
    driver: local

networks:
  proton-tailscale-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16