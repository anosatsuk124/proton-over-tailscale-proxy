# TinyProxy Configuration
# Lightweight HTTP proxy for routing through ProtonVPN

# Port to listen on
Port 8080

# IP address to bind to (0.0.0.0 for all interfaces)
Listen 0.0.0.0

# Timeout in seconds
Timeout 600

# Default error page
DefaultErrorFile "/usr/share/tinyproxy/default.html"

# Statistics page (disabled for security)
# StatFile "/usr/share/tinyproxy/stats.html"

# Log file (use syslog if not specified)
LogFile "/var/log/tinyproxy/tinyproxy.log"

# Log level: Connect, Info, Notice, Warning, Error, Critical
LogLevel Info

# Run as user
User nobody
Group nobody

# Pid file
PidFile "/var/run/tinyproxy/tinyproxy.pid"

# Max number of threads
MaxClients 100

# Min spare servers
MinSpareServers 5

# Max spare servers  
MaxSpareServers 20

# Start servers
StartServers 10

# Max requests per child
MaxRequestsPerChild 0

# Allow access from all (controlled by firewall)
Allow 0.0.0.0/0
Allow ::/0

# Via header
ViaProxyName "tinyproxy"

# Filter settings (disabled by default)
# Filter "/etc/tinyproxy/filter"
# FilterURLs On
# FilterExtended On
# FilterCaseSensitive On
# FilterDefaultDeny No

# Anonymous proxy settings (disabled - no headers hidden)
# Anonymous "Host"
# Anonymous "Authorization"

# ConnectPort settings (which ports CONNECT method can use)
ConnectPort 443
ConnectPort 563
ConnectPort 80
